<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page Not Found | GetPro Estimates</title>
<link rel="icon" href="/Logo.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f2040;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.num{font-family:'DM Sans',sans-serif;font-size:120px;font-weight:900;color:#0EA5A0;line-height:1;letter-spacing:-4px}
h1{font-family:'DM Sans',sans-serif;font-size:32px;font-weight:800;margin:16px 0 12px}
p{font-size:17px;color:rgba(255,255,255,.65);max-width:480px;margin:0 auto 36px;line-height:1.7}
.btn{display:inline-block;background:#0EA5A0;color:#fff;padding:16px 36px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;text-decoration:none;margin:8px}
.btn-outline{background:transparent;border:2px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8)}


/* --- Standardized NAV (injected) --- */
.nav{position:sticky;top:0;z-index:200;background:rgba(250,250,248,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--linen);transition:box-shadow .3s}
.nav.lifted{box-shadow:0 4px 40px rgba(13,27,42,0.09)}
.nav-inner{max-width:1240px;margin:0 auto;padding:0 36px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.nav-logo img{height:44px;width:auto}
.nav-links{display:flex;list-style:none;align-items:center;gap:2px}
.nav-links>li{position:relative}
.nav-links>li>a{display:block;padding:9px 14px;border-radius:9px;font-size:14px;font-weight:500;color:#5A6A7A;transition:color .15s,background .15s}
.nav-links>li>a:hover{color:var(--ink);background:rgba(13,27,42,0.05)}
/* ── DROPDOWN: CSS hover + JS hover-hold ── */
.nav-dd{
  position:absolute;top:100%;left:0;
  padding-top:10px; /* invisible bridge to close gap */
  pointer-events:none;opacity:0;
}
.nav-dd-inner{
  background:var(--white);border-radius:18px;
  min-width:220px;box-shadow:var(--sh-lift);
  border:1px solid var(--linen);padding:8px;
  transform:translateY(-6px);
  transition:opacity .18s,transform .18s;
  opacity:0;
}
.nav-links>li.dd-active .nav-dd{pointer-events:auto;opacity:1}
.nav-links>li.dd-active .nav-dd-inner{opacity:1;transform:translateY(0)}
.nav-dd-sect{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--smoke);padding:8px 12px 4px;font-family:'DM Sans',sans-serif}
.nav-dd a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:#374151;transition:background .12s}
.nav-dd a:hover{background:var(--canvas-2);color:var(--ink)}
.nav-cities-dd{min-width:260px}
.nav-cities-dd .nav-dd-inner{max-height:480px;overflow-y:auto}
.nav-cta{background:var(--ink)!important;color:var(--white)!important;padding:10px 22px!important;border-radius:50px!important;font-size:13px!important;font-weight:700!important;letter-spacing:.3px;transition:all .2s var(--ease-out)!important}
.nav-cta:hover{background:var(--teal)!important;box-shadow:var(--sh-teal)!important;transform:translateY(-1px)}
.nav-toggle{display:none;background:none;border:none;padding:6px;color:var(--ink)}

/* ── HERO ─────────────────────────────────────────── */

</style>
<!-- Google Analytics GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHGZ4JVJ20"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-HHGZ4JVJ20');</script>

<link rel="stylesheet" href="/assets/brand.css"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHGZ4JVJ20"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-HHGZ4JVJ20");</script>
</head>
<body>
<div class="num">404</div>
<h1>Page Not Found</h1>
<p>The page you're looking for doesn't exist. Head back to the homepage to find free estimates from licensed local contractors in your city.</p>
<a href="/" class="btn">Get a Free Estimate</a>
<a href="/blog/" class="btn btn-outline">Read Our Guides</a>

<script>
(function(){
  const mainNav=document.getElementById('mainNav');
  if(mainNav){
    window.addEventListener('scroll',()=>{mainNav.classList.toggle('lifted',window.scrollY>16)},{passive:true});
  }

  const navToggle=document.getElementById('navToggle');
  const navLinks=document.getElementById('navLinks');
  if(navToggle && navLinks){
    navToggle.addEventListener('click',()=>navLinks.classList.toggle('open'));
  }

  const ddItems=[...document.querySelectorAll('.has-dd')];
  ddItems.forEach(li=>{
    let timer;
    li.addEventListener('mouseenter',()=>{
      clearTimeout(timer);
      ddItems.forEach(x=>x.classList.remove('dd-active'));
      li.classList.add('dd-active');
    });
    li.addEventListener('mouseleave',()=>{
      timer=setTimeout(()=>li.classList.remove('dd-active'),220);
    });
    const dd=li.querySelector('.nav-dd');
    if(dd){
      dd.addEventListener('mouseenter',()=>clearTimeout(timer));
      dd.addEventListener('mouseleave',()=>{timer=setTimeout(()=>li.classList.remove('dd-active'),220);});
    }
  });

  document.addEventListener('click',(e)=>{
    if(!e.target.closest('.has-dd')) ddItems.forEach(x=>x.classList.remove('dd-active'));
  });
})();
</script>
</body>
</html>
